name: Update GitHub Activity

on:
  schedule:
    - cron: 30 0 */2 * *
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - .github/workflows/update-activity.yml

concurrency:
  # github.event.pull_request.number || github.ref: pull request number or branch name if not a pull request
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CHECK_PERMISSIONS: 0

permissions: {}

jobs:
  update-activity:
    name: Update GitHub activity
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: write
    steps:
      - id: check-permissions
        name: Check action permissions
        uses: GitHubSecurityLab/actions-permissions/monitor@bf82d13b9b10051d224345ab9184f5ede0a94289 # v1.0.2-beta9
        if: env.CHECK_PERMISSIONS == '1'
      - id: checkout-repo
        name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - id: update-activity
        name: Update GitHub Activity
        uses: TheDanniCraft/activity-log@130ff6ba97c30b2d272f27851db0a347b29472af # v1
        with:
          GITHUB_USERNAME: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.ACTION_TOKEN }}
          EVENT_LIMIT: 15
          HIDE_DETAILS_ON_PRIVATE_REPOS: true
          IGNORE_EVENTS: "[DeleteEvent, WatchEvent]"
          EVENT_EMOJI_MAP: |
            PushEvent: "🚀"
            CreateEvent: "✨"
            CommitCommentEvent: "🗣"
            IssueCommentEvent: "🗣"
            IssuesEvent: |
              opened: "❗"
              closed: "✅"
              labeled: "🏷️"
            PullRequestEvent: |
              opened: "🔀"
              merged: "✔️"
              labeled: "🏷️"
